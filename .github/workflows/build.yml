name: Build Ashizw Module

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Get current version info
      id: current_version
      run: |
        VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
        VERSION_CODE=$(grep "^versionCode=" module.prop | cut -d'=' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION (code: $VERSION_CODE)"

    - name: Create module directory
      run: mkdir -p ashizw_module

    - name: Copy module files
      run: |
        cp -r action.sh \
            customize.sh \
            post-fs-data.sh \
            service.sh \
            uninstall.sh \
            module.prop \
            update.json \
            banner.jpeg \
            system \
            webroot \
            ashizw_module/

    - name: Add update-binary (stub for Magisk)
      run: |
        mkdir -p ashizw_module/META-INF/com/google/android
        cat > ashizw_module/META-INF/com/google/android/update-binary << 'EOF'
        #!/system/bin/sh
        # Stub update-binary for Magisk compatibility
        exit 0
        EOF
        chmod 755 ashizw_module/META-INF/com/google/android/update-binary

        cat > ashizw_module/META-INF/com/google/android/updater-script << 'EOF'
        #MAGISK
        EOF

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ashizw-v${{ steps.current_version.outputs.version }}-build${{ github.run_number }}
        path: ashizw_module/
        retention-days: 30
        compression-level: 6
