name: Build Ashizw Module

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        persist-credentials: false
      
    - name: Get current version info
      id: current_version
      run: |
        VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
        VERSION_CODE=$(grep "^versionCode=" module.prop | cut -d'=' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION (code: $VERSION_CODE)"
        
    - name: Generate CI build version
      id: new_version
      run: |
        CURRENT_VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
        CURRENT_CODE=$(grep "^versionCode=" module.prop | cut -d'=' -f2)
        
        # Generate a unique CI build suffix based on run number
        # Example: 1.4 -> 1.4.15 (CI Build #15)
        # This does NOT modify the repo's module.prop permanently
        CI_BUILD_NUM="${{ github.run_number }}"
        NEW_VERSION="${CURRENT_VERSION}.${CI_BUILD_NUM}"
        NEW_CODE=$((CURRENT_CODE + CI_BUILD_NUM))
        
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "new_version_code=$NEW_CODE" >> $GITHUB_OUTPUT
        echo "CI Build version: $NEW_VERSION (code: $NEW_CODE)"
        
    - name: Update module.prop temporarily for this build
      run: |
        sed -i "s/^version=.*/version=${{ steps.new_version.outputs.new_version }}/" module.prop
        sed -i "s/^versionCode=.*/versionCode=${{ steps.new_version.outputs.new_version_code }}/" module.prop
        echo "Temporarily updated module.prop to version ${{ steps.new_version.outputs.new_version }} for this build artifact"
        cat module.prop
        
    - name: Commit version update (skip for PRs)
      if: false  # Disabled: Manual version management recommended
      uses: stefanzweifel/git-auto-commit-action@v6
      with:
        commit_message: "chore: bump version to ${{ steps.new_version.outputs.new_version }} [skip ci]"
        file_pattern: module.prop
        branch: ${{ github.head_ref || github.ref_name }}
        
    - name: Create module directory
      run: |
        mkdir -p ashizw_module
        
    - name: Copy module files
      run: |
        cp -r action.sh \
            customize.sh \
            post-fs-data.sh \
            service.sh \
            uninstall.sh \
            module.prop \
            update.json \
            banner.jpeg \
            system \
            webroot \
            ashizw_module/
            
    - name: Add update-binary (stub for Magisk)
      run: |
        mkdir -p ashizw_module/META-INF/com/google/android
        cat > ashizw_module/META-INF/com/google/android/update-binary << 'EOF'
        #!/system/bin/sh
        # Stub update-binary for Magisk compatibility
        exit 0
        EOF
        chmod 755 ashizw_module/META-INF/com/google/android/update-binary
        
        cat > ashizw_module/META-INF/com/google/android/updater-script << 'EOF'
        #MAGISK
        EOF
        
    - name: Get version description
      id: version_desc
      run: |
        VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
        echo "description=Ashizw v${VERSION} - Now With WebUI Support" >> $GITHUB_OUTPUT
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ashizw-v${{ steps.new_version.outputs.new_version }}
        path: ashizw_module/
        retention-days: 30
        compression-level: 6
